<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#022C22"/>
      <stop offset="50%" style="stop-color:#064E3B"/>
      <stop offset="100%" style="stop-color:#022C22"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="200" fill="url(#emeraldGrad)"/>

  <!-- 网格线 -->
  <g stroke="#10B981" stroke-opacity="0.1" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>

  <!-- 左侧六边形 Logo -->
  <g transform="translate(40, 20)">
    <polygon
      points="80,5 143,38 143,112 80,145 17,112 17,38"
      fill="none"
      stroke="#10B981"
      stroke-width="1.5"
    />
    <!-- K线 -->
    <g fill="#059669" stroke="#10B981" stroke-width="1">
      <rect x="35" y="68" width="10" height="18" rx="1.5"/>
      <rect x="52" y="56" width="10" height="20" rx="1.5"/>
      <rect x="69" y="64" width="10" height="18" rx="1.5"/>
      <rect x="86" y="48" width="10" height="20" rx="1.5"/>
      <rect x="103" y="42" width="10" height="22" rx="1.5"/>
    </g>
    <!-- 趋势线 -->
    <polyline
      points="40,78 57,66 74,70 91,54 108,48"
      fill="none"
      stroke="#34D399"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- 数据点 -->
    <g fill="#34D399">
      <circle cx="40" cy="78" r="2"/>
      <circle cx="57" cy="66" r="2"/>
      <circle cx="74" cy="70" r="2"/>
      <circle cx="91" cy="54" r="2"/>
      <circle cx="108" cy="48" r="3"/>
    </g>
    <!-- 顶点 -->
    <g fill="#10B981">
      <circle cx="80" cy="5" r="2"/>
      <circle cx="143" cy="38" r="2"/>
      <circle cx="143" cy="112" r="2"/>
      <circle cx="80" cy="145" r="2"/>
      <circle cx="17" cy="112" r="2"/>
      <circle cx="17" cy="38" r="2"/>
    </g>
  </g>

  <!-- 标题区域 -->
  <text x="220" y="70" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">
    Crypto Trading Agent
  </text>
  <text x="220" y="110" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="16" fill="#34D399" letter-spacing="1">
    Deep Reinforcement Learning for Cryptocurrency Trading
  </text>

  <!-- 右侧装饰性K线图 -->
  <g transform="translate(520, 30)" opacity="0.6">
    <!-- K线 -->
    <g fill="#059669" stroke="#10B981" stroke-width="0.8">
      <rect x="0" y="90" width="8" height="30" rx="1"/>
      <rect x="20" y="75" width="8" height="35" rx="1"/>
      <rect x="40" y="85" width="8" height="25" rx="1"/>
      <rect x="60" y="60" width="8" height="40" rx="1"/>
      <rect x="80" y="50" width="8" height="35" rx="1"/>
      <rect x="100" y="40" width="8" height="30" rx="1"/>
      <rect x="120" y="55" width="8" height="25" rx="1"/>
      <rect x="140" y="35" width="8" height="35" rx="1"/>
      <rect x="160" y="25" width="8" height="30" rx="1"/>
      <rect x="180" y="15" width="8" height="25" rx="1"/>
      <rect x="200" y="30" width="8" height="20" rx="1"/>
      <rect x="220" y="20" width="8" height="30" rx="1"/>
    </g>
    <!-- 趋势线 -->
    <polyline
      points="4,105 24,90 44,95 64,75 84,65 104,55 124,65 144,50 164,38 184,25 204,38 224,32"
      fill="none"
      stroke="#34D399"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- 底部装饰线 -->
  <rect x="220" y="130" width="200" height="2" rx="1" fill="url(#lineGrad)"/>

  <!-- 技术标签 -->
  <g transform="translate(220, 150)">
    <rect x="0" y="0" width="50" height="20" rx="4" fill="#059669" opacity="0.3"/>
    <text x="25" y="14" font-family="SF Mono, Monaco, monospace" font-size="10" fill="#34D399" text-anchor="middle">PPO</text>

    <rect x="60" y="0" width="60" height="20" rx="4" fill="#059669" opacity="0.3"/>
    <text x="90" y="14" font-family="SF Mono, Monaco, monospace" font-size="10" fill="#34D399" text-anchor="middle">LSTM</text>

    <rect x="130" y="0" width="70" height="20" rx="4" fill="#059669" opacity="0.3"/>
    <text x="165" y="14" font-family="SF Mono, Monaco, monospace" font-size="10" fill="#34D399" text-anchor="middle">PyTorch</text>
  </g>
</svg>
