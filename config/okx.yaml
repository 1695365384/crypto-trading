# OKX 数据源配置 - 优化版
data:
  tickers:
    - BTCUSDT
    - ETHUSDT
  start_date: "2024-01-01"
  end_date: "2025-12-31"
  timeframe: 1  # 分钟

  # 技术指标
  indicators:
    - macd
    - rsi_14
    - boll_ub
    - boll_lb
    - ema_20
    - ema_50
    - atr
    - obv

  # 数据分割
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

env:
  initial_amount: 10000.0
  max_position_pct: 0.5
  transaction_cost_pct: 0.002
  slippage_pct: 0.001
  reward_scaling: 1.0
  lookback_window: 60
  num_assets: 2
  stop_loss_pct: 0.05
  take_profit_pct: 0.15

model:
  algorithm: "PPO"
  learning_rate: 0.0001
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.15
  entropy_coef: 0.02
  value_coef: 0.5
  max_grad_norm: 0.5
  batch_size: 256
  buffer_size: 8192
  n_epochs: 4
  total_timesteps: 2000000
  save_freq: 200000
  eval_freq: 100000

  # 网络架构配置
  network:
    lstm_hidden_size: 128
    lstm_num_layers: 1
    lstm_dropout: 0.1
    mlp_hidden_sizes:
      - 256
      - 128
      - 64
    mlp_dropout: 0.2
    feature_dim_per_step: 0

data_dir: "./data/okx"
model_dir: "./models"
log_dir: "./logs"
device: "auto"
seed: 42
