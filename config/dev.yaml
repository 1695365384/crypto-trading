# 开发环境配置 - 快速测试
data:
  tickers:
    - BTCUSDT
  start_date: "2024-01-01"
  end_date: "2024-03-31"
  timeframe: 1
  indicators:
    - macd
    - rsi_14
    - ema_20
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

env:
  initial_amount: 10000.0
  max_position_pct: 0.5
  transaction_cost_pct: 0.001
  slippage_pct: 0.0005
  reward_scaling: 0.0001
  lookback_window: 30
  num_assets: 1
  stop_loss_pct: 0.1
  take_profit_pct: 0.2

model:
  algorithm: "PPO"
  # 网络架构配置 - LSTM + MLP 混合架构
  network:
    lstm_hidden_size: 128
    lstm_num_layers: 1
    lstm_dropout: 0.1
    mlp_hidden_sizes:
      - 256
      - 128
      - 64
    mlp_dropout: 0.2
    feature_dim_per_step: 0  # 自动计算
  actor_hidden_sizes:
    - 64
    - 32
  critic_hidden_sizes:
    - 64
    - 32
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  batch_size: 32
  buffer_size: 512
  n_epochs: 5
  total_timesteps: 10000
  save_freq: 5000
  eval_freq: 1000

data_dir: "./data"
model_dir: "./models"
log_dir: "./logs"
device: "cpu"
seed: 42
